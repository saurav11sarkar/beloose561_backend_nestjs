# ============================================================
# GitHub Actions: CI/CD Docker Deploy
# ============================================================
# Ei workflow push to main hole:
# 1. npm install
# 2. build/lint/test run kore
# 3. Docker image build kore Docker Hub-e push kore
# 4. VPS-e SSH kore latest image pull + restart kore
#
# GitHub Secrets lagbe:
# DOCKER_USERNAME, DOCKER_PASSWORD
# SERVER_HOST, SERVER_USER, SERVER_SSH_KEY
# MONGO_URI, CORS_ORIGIN
# JWT_SECRET, ACCESS_TOKEN_SECRET, REFRESH_TOKEN_SECRET
# BCRYPT_SALT_ROUNDS
#
# Optional GitHub Variables:
# DOCKER_IMAGE_NAME, APP_DIR, APP_PORT, CONTAINER_PORT
# APP_NAME, APP_CONTAINER_NAME
# ============================================================

name: CI/CD Docker Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  # Node version used in GitHub Actions
  NODE_VERSION: 20

  # Docker image name. GitHub repo Variables theke override korte parben.
  DOCKER_IMAGE_NAME: ${{ vars.DOCKER_IMAGE_NAME || 'nestjs-boilerplate-mongodb' }}

  # VPS-er deploy folder. Example: /opt/my-api
  APP_DIR: ${{ vars.APP_DIR || '/opt/nestjs-boilerplate-mongodb' }}

  # VPS public port and container app port
  APP_PORT: ${{ vars.APP_PORT || '5000' }}
  CONTAINER_PORT: ${{ vars.CONTAINER_PORT || '5000' }}

jobs:
  # ------------------------------------------------------------
  # Job 1: Quality check
  # ------------------------------------------------------------
  quality:
    name: Build, Lint, And Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build TypeScript
        run: npm run build

      - name: Lint code
        run: npm run lint

      - name: Run unit tests
        run: npm test

      - name: Run e2e tests
        run: npm run test:e2e

  # ------------------------------------------------------------
  # Job 2: Docker build and push
  # ------------------------------------------------------------
  docker:
    name: Build And Push Docker Image
    runs-on: ubuntu-latest
    needs: quality

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          platforms: linux/amd64
          cache-from: type=gha
          cache-to: type=gha,mode=max
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/${{ env.DOCKER_IMAGE_NAME }}:latest
            ${{ secrets.DOCKER_USERNAME }}/${{ env.DOCKER_IMAGE_NAME }}:${{ github.sha }}

  # ------------------------------------------------------------
  # Job 3: Deploy latest Docker image to VPS
  # ------------------------------------------------------------
  deploy:
    name: Deploy To VPS
    runs-on: ubuntu-latest
    needs: docker
    environment: production

    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_PORT || 22 }}
          script: |
            set -e

            # VPS deploy folder and Docker image
            APP_DIR="${{ env.APP_DIR }}"
            IMAGE="${{ secrets.DOCKER_USERNAME }}/${{ env.DOCKER_IMAGE_NAME }}:latest"

            mkdir -p "$APP_DIR"
            cd "$APP_DIR"

            # ------------------------------------------------
            # Production .env file
            # Ei values GitHub Secrets/Variables theke ashbe.
            # Optional service use na korle related secrets empty rakhte paren.
            # ------------------------------------------------
            cat > .env << 'ENVEOF'
            NODE_ENV=production
            PORT=${{ env.CONTAINER_PORT }}
            APP_NAME=${{ vars.APP_NAME || 'NestJS Boilerplate MongoDB' }}
            CORS_ORIGIN=${{ secrets.CORS_ORIGIN }}
            MONGO_URI=${{ secrets.MONGO_URI }}
            JWT_SECRET=${{ secrets.JWT_SECRET }}
            JWT_EXPIRE=${{ secrets.JWT_EXPIRE }}
            BCRYPT_SALT_ROUNDS=${{ secrets.BCRYPT_SALT_ROUNDS }}
            ACCESS_TOKEN_SECRET=${{ secrets.ACCESS_TOKEN_SECRET }}
            ACCESS_TOKEN_EXPIRES=${{ secrets.ACCESS_TOKEN_EXPIRES }}
            REFRESH_TOKEN_SECRET=${{ secrets.REFRESH_TOKEN_SECRET }}
            REFRESH_TOKEN_EXPIRES=${{ secrets.REFRESH_TOKEN_EXPIRES }}
            CLOUDINARY_CLOUD_NAME=${{ secrets.CLOUDINARY_CLOUD_NAME }}
            CLOUDINARY_API_KEY=${{ secrets.CLOUDINARY_API_KEY }}
            CLOUDINARY_API_SECRET=${{ secrets.CLOUDINARY_API_SECRET }}
            CLOUDINARY_FOLDER=${{ vars.CLOUDINARY_FOLDER || 'nestjs-boilerplate' }}
            EMAIL_EXPIRES=${{ secrets.EMAIL_EXPIRES }}
            EMAIL_HOST=${{ secrets.EMAIL_HOST }}
            EMAIL_PORT=${{ secrets.EMAIL_PORT }}
            EMAIL_ADDRESS=${{ secrets.EMAIL_ADDRESS }}
            EMAIL_PASS=${{ secrets.EMAIL_PASS }}
            EMAIL_FROM=${{ secrets.EMAIL_FROM }}
            EMAIL_TO=${{ secrets.EMAIL_TO }}
            ADMIN_EMAIL=${{ secrets.ADMIN_EMAIL }}
            EMAIL_SENDER_NAME=${{ vars.EMAIL_SENDER_NAME || 'NestJS Boilerplate' }}
            STRIPE_PUBLISHABLE_KEY=${{ secrets.STRIPE_PUBLISHABLE_KEY }}
            STRIPE_SECRET_KEY=${{ secrets.STRIPE_SECRET_KEY }}
            STRIPE_WEBHOOK_SECRET=${{ secrets.STRIPE_WEBHOOK_SECRET }}
            STRIPE_PLATFORM_ACCOUNT_ID=${{ secrets.STRIPE_PLATFORM_ACCOUNT_ID }}
            GOOGLE_CLIENT_ID=${{ secrets.GOOGLE_CLIENT_ID }}
            GOOGLE_CLIENT_SECRET=${{ secrets.GOOGLE_CLIENT_SECRET }}
            FRONTEND_URL=${{ secrets.FRONTEND_URL }}
            BACKEND_URL=${{ secrets.BACKEND_URL }}
            DOCKER_USERNAME=${{ secrets.DOCKER_USERNAME }}
            DOCKER_IMAGE_NAME=${{ env.DOCKER_IMAGE_NAME }}
            DOCKER_IMAGE=${{ secrets.DOCKER_USERNAME }}/${{ env.DOCKER_IMAGE_NAME }}:latest
            IMAGE_TAG=latest
            APP_PORT=${{ env.APP_PORT }}
            APP_CONTAINER_NAME=${{ vars.APP_CONTAINER_NAME || 'nestjs_boilerplate_api' }}
            ENVEOF

            # ------------------------------------------------
            # Production docker-compose.yml
            # VPS-e source code lagbe na, only Docker Hub image run korbe.
            # ------------------------------------------------
            cat > docker-compose.yml << 'COMPOSEEOF'
            services:
              app:
                image: ${DOCKER_IMAGE}
                container_name: ${APP_CONTAINER_NAME:-nestjs_boilerplate_api}
                restart: unless-stopped
                env_file:
                  - .env
                ports:
                  - "${APP_PORT:-5000}:${PORT:-5000}"
                networks:
                  - backend_network
                healthcheck:
                  test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:' + (process.env.PORT || 5000)).then(r => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))"]
                  interval: 30s
                  timeout: 5s
                  retries: 3
                  start_period: 30s

            networks:
              backend_network:
                driver: bridge
            COMPOSEEOF

            # Pull latest image and restart container
            docker pull "$IMAGE"
            docker compose down --remove-orphans
            docker compose up -d

            # Remove unused old images to save VPS disk space
            docker image prune -f

            # Show final container status
            docker compose ps
